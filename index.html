<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://*.canva.com;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --header-bg: #1a2e44;
            --green-btn: #28a745;
            --border: #dee2e6;
            --highlight: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; background: transparent; }

        /* تنسيق العداد التنازلي */
        .timer-container {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #ffeeba;
            font-weight: bold;
        }

        /* تنسيق القوائم المنسدلة */
        .controls { display: flex; gap: 15px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        select { 
            padding: 10px; border-radius: 5px; border: 2px solid var(--header-bg); 
            font-size: 1em; width: 180px; background: white; cursor: pointer;
        }

        .table-container { 
            width: 100%; max-width: 950px; margin: auto; background: white; 
            border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; 
        }

        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 600px; }
        thead { background-color: var(--header-bg); color: white; }
        th, td { padding: 12px; border: 1px solid var(--border); }
        
        .btn-entry { 
            background: var(--green-btn); color: white; text-decoration: none; 
            padding: 6px 18px; border-radius: 4px; font-weight: bold; display: inline-block;
        }

        .current-row { background-color: #e8f4fd !important; font-weight: bold; }
        #no-data { padding: 30px; text-align: center; display: none; color: #777; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="countdown-banner" class="timer-container" style="display: none;">
        المتبقي على نهاية الحصة الحالية: <span id="timer-display">--:--</span>
    </div>

    <div class="controls">
        <select id="classFilter" onchange="filterData()">
            <option value="">اختر الصف الدراسي</option>
            <option value="العاشر">العاشر</option>
            <option value="التاسع">التاسع</option>
            <option value="الثامن">الثامن</option>
            <option value="السابع">السابع</option>
            <option value="السادس">السادس</option>
            <option value="الخامس">الخامس</option>
            <option value="الرابع">الرابع</option>
            <option value="الثالث">الثالث</option>
            <option value="الثاني">الثاني</option>
            <option value="الأول">الأول</option>
            <option value="الثامن">الثامن</option>

        </select>

        <select id="dayFilter" onchange="filterData()">
            <option value="">اختر اليوم</option>
            <option value="الأحد">الأحد</option>
            <option value="الاثنين">الاثنين</option>
            <option value="الثلاثاء">الثلاثاء</option>
            <option value="الأربعاء">الأربعاء</option>
            <option value="الخميس">الخميس</option>
        </select>
    </div>

    <div class="table-container">
        <table id="schedule-table">
            <thead>
                <tr>
                    <th>المبحث</th>
                    <th>المعلم</th>
                    <th>بدء</th>
                    <th>نهاية</th>
                    <th>رابط</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="no-data">يرجى اختيار الصف واليوم لعرض الجدول</div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8Yk6Sq2bCZtlrH-mgqDZFYnRc54MYf8vAW6VIpW1WHIzKi5lkoBRTXjv5i8sXBkHMrbR_KHS-kMoV/pub?gid=0&single=true&output=csv"; 
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                allData = rows.map(row => row.split(','));
                filterData();
                setInterval(updateTimer, 1000); // تحديث العداد كل ثانية
            } catch (e) { document.getElementById('no-data').innerText = "خطأ في تحميل البيانات."; }
        }

        function filterData() {
            const selectedClass = document.getElementById('classFilter').value;
            const selectedDay = document.getElementById('dayFilter').value;
            const tableBody = document.getElementById('table-body');
            const noData = document.getElementById('no-data');
            
            tableBody.innerHTML = '';
            let hasResults = false;

            allData.forEach((col, index) => {
                if (col.length >= 7) {
                    const rowClass = col[2]?.trim();
                    const rowDay = col[3]?.trim();

                    if ((!selectedClass || rowClass === selectedClass) && (!selectedDay || rowDay === selectedDay) && col[1]) {
                        hasResults = true;
                        tableBody.innerHTML += `
                            <tr id="row-${index}">
                                <td style="text-align:right; font-weight:bold;">${index+1}- ${col[1]}</td>
                                <td>${col[0]}</td>
                                <td dir="ltr">${col[4]}</td>
                                <td dir="ltr">${col[5]}</td>
                                <td><a href="${col[6].trim()}" target="_blank" class="btn-entry">دخول</a></td>
                            </tr>
                        `;
                    }
                }
            });

            noData.style.display = hasResults ? 'none' : 'block';
            document.getElementById('schedule-table').style.display = hasResults ? 'table' : 'none';
        }

        function updateTimer() {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            let activeTimer = false;

            allData.forEach(col => {
                if (col[4] && col[5]) {
                    const [startH, startM] = col[4].split(':').map(Number);
                    const [endH, endM] = col[5].split(':').map(Number);
                    const startTime = startH * 60 + startM;
                    const endTime = endH * 60 + endM;

                    if (currentTime >= startTime && currentTime < endTime) {
                        activeTimer = true;
                        const diff = endTime - currentTime;
                        document.getElementById('timer-display').innerText = diff + " دقيقة";
                        document.getElementById('countdown-banner').style.display = 'block';
                    }
                }
            });

            if (!activeTimer) document.getElementById('countdown-banner').style.display = 'none';
        }

        loadData();
    </script>
</body>
</html>
